<div class="quick-stats">
  <div class="stat-item">
    <span class="stat-val" counterAnim [counterAnim]="7" suffix="+" [duration]="1500">7+</span>
    <span class="stat-lbl">{{ ls.t.yearsExp }}</span>
  </div>
  <div class="stat-item">
    <span class="stat-val" counterAnim [counterAnim]="15" suffix="+" [duration]="1800">15+</span>
    <span class="stat-lbl">{{ ls.t.projects }}</span>
  </div>
  <div class="stat-item">
    <span class="stat-val" counterAnim [counterAnim]="5" suffix="+" [duration]="1200">5+</span>
    <span class="stat-lbl">{{ ls.t.clients }}</span>
  </div>
</div>
