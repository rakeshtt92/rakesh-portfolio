<section id="contact" class="section">
  <div class="inner">
    <p class="label">Get in touch</p>
    <h2 class="title">Contact</h2>
    <div class="contact-box">
      <!-- <h3 class="contact-heading">Open to work in Sweden &amp; Europe</h3>
      <p class="contact-sub">Based in Gothenburg &mdash; available immediately &mdash; no sponsorship required</p> -->
      <div class="contact-cards">
        <a [href]="'mailto:' + email" class="contact-card">
          <div class="cc-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <div class="cc-text">
            <span class="cc-label">Email</span>
            <span class="cc-value">{{ email }}</span>
          </div>
        </a>
        <a [href]="'tel:' + phone" class="contact-card">
          <div class="cc-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.1 1.18 2 2 0 012.07 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.18 6.18l1.27-.41a2 2 0 012.11.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
            </svg>
          </div>
          <div class="cc-text">
            <span class="cc-label">Phone</span>
            <span class="cc-value">{{ phone }}</span>
          </div>
        </a>
        <a [href]="linkedin" target="_blank" class="contact-card">
          <div class="cc-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/>
              <circle cx="4" cy="4" r="2"/>
            </svg>
          </div>
          <div class="cc-text">
            <span class="cc-label">LinkedIn</span>
            <span class="cc-value">linkedin.com/in/rakesh-tt</span>
          </div>
        </a>
        <a [href]="github" target="_blank" class="contact-card">
          <div class="cc-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/>
            </svg>
          </div>
          <div class="cc-text">
            <span class="cc-label">GitHub</span>
            <span class="cc-value">github.com/rakesh-tt</span>
          </div>
        </a>
      </div>
      <a [href]="'mailto:' + email" class="btn-contact">Send me an email &rarr;</a>
    </div>
  </div>
</section>
